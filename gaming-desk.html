<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电竞桌3D配置视图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .controls h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #00d4ff;
        }
        .controls button {
            display: block;
            width: 100%;
            padding: 8px 15px;
            margin: 5px 0;
            background: #00d4ff;
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .controls button:hover {
            background: #00a8cc;
            transform: translateX(5px);
        }
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .legend h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #00d4ff;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 3px;
        }
        .info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
            max-width: 280px;
        }
        .info h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #00ff88;
        }
        .info-item {
            margin: 6px 0;
            font-size: 11px;
            line-height: 1.5;
        }
        .warning {
            color: #ff6b6b;
            font-weight: bold;
        }
        .ok {
            color: #00ff88;
            font-weight: bold;
        }
        .dimension-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div class="controls">
        <h2>视角控制</h2>
        <button onclick="setView('top')">俯视视角</button>
        <button onclick="setView('front')">正视视角</button>
        <button onclick="setView('side')">侧视视角</button>
        <button onclick="setView('iso')">等轴视角</button>
        <button onclick="resetView()">重置视角</button>
        <div style="margin-top:15px;font-size:12px;color:#888;border-top:1px solid #333;padding-top:10px;">
            键盘：↑↓←→ 移动视角中心
        </div>
    </div>
    
    <div class="legend">
        <h3>图例说明</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #8B4513;"></div>
            <span>电竞桌</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #2c2c2c;"></div>
            <span>大机箱 (左)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #1a1a2a;"></div>
            <span>27寸显示器</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: rgba(0, 212, 255, 0.5);"></div>
            <span>鼠标区域</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: rgba(0, 255, 136, 0.3);"></div>
            <span>手部活动空间</span>
        </div>
    </div>
    
    <div class="info">
        <h3>布局信息</h3>
        <div class="info-item">桌面尺寸: <b>180cm × 80cm</b></div>
        <div class="info-item">机箱位置: <b>左侧 (距桌边5cm)</b></div>
        <div class="info-item">主显示器: <b>桌面中心</b></div>
        <div class="info-item">副显示器: <b>右侧偏外 45cm处</b></div>
        <div class="info-item ok">鼠标区域: 完全自由无遮挡</div>
        <div class="info-item ok">手部空间: 45cm深度不受限</div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 场景设置
        let scene, camera, renderer, controls;
        let objects = [];
        
        // 尺寸参数 (单位: cm)
        const PARAMS = {
            desk: { width: 180, depth: 80, height: 75, thickness: 3 },
            case: { width: 22, depth: 48, height: 45 },
            monitor: { width: 61, height: 36, depth: 8, standHeight: 12 },
            mouseArea: { width: 40, depth: 35 },
            handSpace: { width: 60, depth: 45 }
        };
        
        // 初始化
        function init() {
            const container = document.getElementById('container');
            
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 200, 500);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                1,
                1000
            );
            camera.position.set(150, 180, 150);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            // 创建控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.1;
            
            // 添加灯光
            setupLights();
            
            // 添加网格
            addGrid();
            
            // 创建物体
            createDesk();
            createCase();
            createMonitors();
            createMouseArea();
            createHandSpace();
            createDimensions();
            
            // 窗口大小调整
            window.addEventListener('resize', onWindowResize);
            
            // 开始动画
            animate();
        }
        
        // 设置灯光
        function setupLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(100, 150, 100);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            const fillLight = new THREE.DirectionalLight(0x00d4ff, 0.3);
            fillLight.position.set(-100, 50, -100);
            scene.add(fillLight);
        }
        
        // 添加网格
        function addGrid() {
            const gridHelper = new THREE.GridHelper(300, 30, 0x444466, 0x2a2a4a);
            scene.add(gridHelper);
            
            // 添加坐标轴
            const axesHelper = new THREE.AxesHelper(50);
            scene.add(axesHelper);
        }
        
        // 创建电竞桌
        function createDesk() {
            const deskGroup = new THREE.Group();
            
            // 桌面
            const topGeometry = new THREE.BoxGeometry(
                PARAMS.desk.width,
                PARAMS.desk.thickness,
                PARAMS.desk.depth
            );
            const topMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B4513,
                roughness: 0.6,
                metalness: 0.1
            });
            const desktop = new THREE.Mesh(topGeometry, topMaterial);
            desktop.position.y = PARAMS.desk.height;
            desktop.castShadow = true;
            desktop.receiveShadow = true;
            deskGroup.add(desktop);
            
            // 桌腿
            const legGeometry = new THREE.BoxGeometry(5, PARAMS.desk.height, 5);
            const legMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            
            const legPositions = [
                { x: -80, z: -35 },
                { x: 80, z: -35 },
                { x: -80, z: 35 },
                { x: 80, z: 35 }
            ];
            
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeometry, legMaterial);
                leg.position.set(pos.x, PARAMS.desk.height / 2, pos.z);
                leg.castShadow = true;
                deskGroup.add(leg);
            });
            
            scene.add(deskGroup);
            objects.push(deskGroup);
        }
        
        // 创建机箱
        function createCase() {
            const caseGroup = new THREE.Group();
            
            // 机箱主体
            const caseGeometry = new THREE.BoxGeometry(
                PARAMS.case.width,
                PARAMS.case.height,
                PARAMS.case.depth
            );
            const caseMaterial = new THREE.MeshStandardMaterial({
                color: 0x2c2c2c,
                roughness: 0.3,
                metalness: 0.7
            });
            const pcCase = new THREE.Mesh(caseGeometry, caseMaterial);
            pcCase.castShadow = true;
            caseGroup.add(pcCase);
            
            // 玻璃侧板
            const glassGeometry = new THREE.BoxGeometry(
                PARAMS.case.width + 0.5,
                PARAMS.case.height - 4,
                PARAMS.case.depth - 4
            );
            const glassMaterial = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.7
            });
            const glass = new THREE.Mesh(glassGeometry, glassMaterial);
            glass.position.x = 0;
            caseGroup.add(glass);
            
            // RGB灯效条
            const rgbGeometry = new THREE.BoxGeometry(PARAMS.case.width + 0.8, 2, PARAMS.case.depth - 2);
            const rgbMaterial = new THREE.MeshStandardMaterial({
                color: 0xff00ff,
                emissive: 0xff00ff,
                emissiveIntensity: 0.5
            });
            const rgb = new THREE.Mesh(rgbGeometry, rgbMaterial);
            rgb.position.y = -10;
            caseGroup.add(rgb);
            
            // 放置位置：左侧，距桌面左边缘5cm
            caseGroup.position.set(
                -PARAMS.desk.width / 2 + PARAMS.case.width / 2 + 5,
                PARAMS.desk.height + PARAMS.case.height / 2,
                -5
            );
            
            scene.add(caseGroup);
            objects.push(caseGroup);
        }
        
        // 创建显示器
        function createMonitors() {
            // 主显示器 - 桌面中心
            createMonitor(0, 0, true);
            
            // 副显示器 - 右侧45cm处
            createMonitor(45, 0, false);
        }
        
        function createMonitor(offsetX, offsetZ, isMain) {
            const monitorGroup = new THREE.Group();
            
            // 屏幕
            const screenGeometry = new THREE.BoxGeometry(
                PARAMS.monitor.width,
                PARAMS.monitor.height,
                1
            );
            const screenMaterial = new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,
                roughness: 0.2,
                metalness: 0.5
            });
            const screen = new THREE.Mesh(screenGeometry, screenMaterial);
            screen.position.y = PARAMS.monitor.height / 2 + PARAMS.monitor.standHeight;
            monitorGroup.add(screen);
            
            // 显示画面
            const displayGeometry = new THREE.PlaneGeometry(
                PARAMS.monitor.width - 2,
                PARAMS.monitor.height - 2
            );
            const displayColor = isMain ? 0x00d4ff : 0x00ff88;
            const displayMaterial = new THREE.MeshBasicMaterial({ color: displayColor });
            const display = new THREE.Mesh(displayGeometry, displayMaterial);
            display.position.set(
                0,
                PARAMS.monitor.height / 2 + PARAMS.monitor.standHeight,
                0.6
            );
            monitorGroup.add(display);
            
            // 支架
            const standGeometry = new THREE.BoxGeometry(15, PARAMS.monitor.standHeight, 10);
            const standMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const stand = new THREE.Mesh(standGeometry, standMaterial);
            stand.position.y = PARAMS.monitor.standHeight / 2;
            stand.castShadow = true;
            monitorGroup.add(stand);
            
            // 底座
            const baseGeometry = new THREE.BoxGeometry(20, 2, 15);
            const base = new THREE.Mesh(baseGeometry, standMaterial);
            base.position.y = 1;
            monitorGroup.add(base);
            
            // 位置计算
            const zPos = -PARAMS.desk.depth / 4 + offsetZ;
            monitorGroup.position.set(offsetX, PARAMS.desk.height, zPos);
            
            // 略微朝向用户
            monitorGroup.rotation.x = -0.05;
            
            scene.add(monitorGroup);
            objects.push(monitorGroup);
        }
        
        // 创建鼠标区域
        function createMouseArea() {
            const geometry = new THREE.PlaneGeometry(
                PARAMS.mouseArea.width,
                PARAMS.mouseArea.depth
            );
            const material = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const mouseArea = new THREE.Mesh(geometry, material);
            mouseArea.rotation.x = -Math.PI / 2;
            mouseArea.position.set(
                -10,
                PARAMS.desk.height + 0.5,
                15
            );
            
            // 边框
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00d4ff, linewidth: 2 });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            wireframe.rotation.x = -Math.PI / 2;
            wireframe.position.copy(mouseArea.position);
            
            scene.add(mouseArea);
            scene.add(wireframe);
            
            // 鼠标模型
            const mouseGeometry = new THREE.BoxGeometry(6, 3, 10);
            const mouseMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const mouse = new THREE.Mesh(mouseGeometry, mouseMaterial);
            mouse.position.set(-10, PARAMS.desk.height + 2, 15);
            scene.add(mouse);
        }
        
        // 创建手部活动空间
        function createHandSpace() {
            const geometry = new THREE.BoxGeometry(
                PARAMS.handSpace.width,
                20,
                PARAMS.handSpace.depth
            );
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ff88,
                transparent: true,
                opacity: 0.15,
                side: THREE.DoubleSide
            });
            const handSpace = new THREE.Mesh(geometry, material);
            handSpace.position.set(
                -10,
                PARAMS.desk.height + 10,
                20
            );
            
            // 边框
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff88, linewidth: 2 });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            wireframe.position.copy(handSpace.position);
            
            scene.add(handSpace);
            scene.add(wireframe);
        }
        
        // 创建尺寸标注
        function createDimensions() {
            // 桌面尺寸标注线
            createDimensionLine(
                { x: -90, y: 0.5, z: 50 },
                { x: 90, y: 0.5, z: 50 },
                '180cm',
                0xffff00
            );
            
            createDimensionLine(
                { x: 100, y: 0.5, z: -40 },
                { x: 100, y: 0.5, z: 40 },
                '80cm',
                0xffff00
            );
            
            // 显示器间距标注
            createDimensionLine(
                { x: 0, y: PARAMS.desk.height + 40, z: -35 },
                { x: 45, y: PARAMS.desk.height + 40, z: -35 },
                '45cm',
                0x00d4ff
            );
            
            // 机箱到鼠标区距离
            createDimensionLine(
                { x: -75, y: PARAMS.desk.height + 5, z: 50 },
                { x: -30, y: PARAMS.desk.height + 5, z: 50 },
                '>50cm 安全间距',
                0x00ff88
            );
        }
        
        function createDimensionLine(start, end, label, color) {
            const points = [
                new THREE.Vector3(start.x, start.y, start.z),
                new THREE.Vector3(end.x, end.y, end.z)
            ];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            
            // 添加端点标记
            const markerGeometry = new THREE.SphereGeometry(1, 8, 8);
            const markerMaterial = new THREE.MeshBasicMaterial({ color: color });
            
            const marker1 = new THREE.Mesh(markerGeometry, markerMaterial);
            marker1.position.set(start.x, start.y, start.z);
            scene.add(marker1);
            
            const marker2 = new THREE.Mesh(markerGeometry, markerMaterial);
            marker2.position.set(end.x, end.y, end.z);
            scene.add(marker2);
        }
        
        // 视角控制
        function setView(view) {
            switch(view) {
                case 'top':
                    camera.position.set(0, 250, 0);
                    camera.lookAt(0, 0, 0);
                    break;
                case 'front':
                    camera.position.set(0, 100, 200);
                    camera.lookAt(0, 50, 0);
                    break;
                case 'side':
                    camera.position.set(200, 100, 0);
                    camera.lookAt(0, 50, 0);
                    break;
                case 'iso':
                    camera.position.set(150, 180, 150);
                    camera.lookAt(0, 40, 0);
                    break;
            }
            controls.update();
        }
        
        function resetView() {
            camera.position.set(150, 180, 150);
            camera.lookAt(0, 40, 0);
            controls.reset();
        }
        
        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 键盘控制视角中心
        const moveSpeed = 5;
        document.addEventListener('keydown', (event) => {
            const target = controls.target;
            switch(event.key) {
                case 'ArrowUp':
                    target.z -= moveSpeed;
                    break;
                case 'ArrowDown':
                    target.z += moveSpeed;
                    break;
                case 'ArrowLeft':
                    target.x -= moveSpeed;
                    break;
                case 'ArrowRight':
                    target.x += moveSpeed;
                    break;
            }
            controls.update();
        });
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
