<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Scope - Tom的作品集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0,212,255,0.2);
        }
        .card h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .card p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .card a {
            display: inline-block;
            padding: 8px 20px;
            background: #00d4ff;
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .card a:hover {
            background: #00ff88;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 60px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>3D Model Scope</h1>
        <p class="subtitle">Tom 的 Three.js 作品集</p>
        
        <div class="grid">
            <div class="card">
                <h3>电竞桌配置视图</h3>
                <p>双屏+机箱布局的3D可视化方案，展示桌面空间规划</p>
                <a href="gaming-desk.html">查看模型</a>
            </div>
            <!-- Tom 的新模型将添加在这里 -->
            <div class="empty" style="display:none;">
                <p>更多模型敬请期待...</p>
            </div>
        </div>
    </div>
</body>
</html>
